# WebSocket upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Gzip Compression ───────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;        # compression level 1-9, 6 is good balance
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;      # don't compress tiny files
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/x-javascript
    image/svg+xml
    font/truetype
    font/opentype
    application/vnd.ms-fontobject;

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ───────────────────────────────────────────────
    # Prevent clickjacking — page cannot be embedded in iframe
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Basic XSS protection for older browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Control referrer information sent to other sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy
    # Controls what resources browser is allowed to load
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob:;
        font-src 'self';
        connect-src 'self' http://localhost:3005 ws://localhost:3005 http://localhost ws://localhost;
    " always;

    # ── Static File Caching ────────────────────────────────────────────
    # Cache JS/CSS/images aggressively — Vite adds content hash to filenames
    # so cache busting is automatic
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;  # single fallback — return 404 if not found
    }

    # Everything else — React Router
    location / {
        try_files $uri $uri/ /index.html;  # single fallback — serve index.html
    }

    # ── API Proxy ──────────────────────────────────────────────────────
    location ^~ /api/v1/ {
        proxy_pass http://server:5050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── Socket.io Proxy ────────────────────────────────────────────────
    location ^~ /socket.io/ {
        proxy_pass http://server:5050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        # Allow WebSocket upgrade
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Socket.io needs longer timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
}